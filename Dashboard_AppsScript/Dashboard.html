<!doctype html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #18202a;
        --muted: #667085;
        --line: #d9dee7;
        --brand: #0b3d91;
        --brand-2: #c8202f;
        --ok: #0f766e;
        --warn: #b45309;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }

      body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }

      header {
        background: #ffffff; border-bottom: 1px solid var(--line); padding: 14px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
      }

      h1 { margin: 0; font-size: 20px; line-height: 1.2; }
      h2 { margin: 0 0 14px; font-size: 16px; }
      .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

      nav { display: flex; gap: 6px; flex-wrap: wrap; }
      .tab {
        border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 999px;
        padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
      }
      .tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }

      .shell { max-width: 1280px; margin: 0 auto; padding: 22px; }
      .view { display: none; }
      .view.active { display: block; }

      .grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 18px; align-items: start; }
      .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }

      .panel, .metric { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
      .metric { padding: 14px; min-height: 88px; }
      .metric .label { color: var(--muted); font-size: 12px; }
      .metric .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
      .panel { padding: 18px; }

      label { display: block; font-size: 12px; font-weight: 700; color: #344054; margin: 0 0 6px; }
      input, textarea, select {
        width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 9px 10px; font: inherit; background: #fff;
      }
      textarea { min-height: 76px; resize: vertical; font-family: inherit; }
      textarea.mono { font-family: Consolas, Menlo, monospace; font-size: 12px; }

      .fields { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .fields.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .full { grid-column: 1 / -1; }

      .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
      button { border: 0; border-radius: 6px; padding: 9px 14px; font-weight: 700; cursor: pointer; font-size: 13px; }
      .primary { background: var(--brand); color: #fff; }
      .secondary { background: #edf2f7; color: #1f2937; }
      .danger { background: #fdecea; color: var(--danger); }
      button:disabled { opacity: 0.6; cursor: default; }

      .status { font-size: 13px; color: var(--muted); min-height: 20px; margin-top: 10px; }
      .status.error { color: var(--danger); }
      .status.ok { color: var(--ok); }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid var(--line); padding: 8px 6px; text-align: left; vertical-align: top; }
      th { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; }
      tr.clickable { cursor: pointer; }
      tr.clickable:hover { background: #f7f9fc; }
      .table-scroll { overflow-x: auto; }

      .stack { display: grid; gap: 18px; }
      .pill {
        display: inline-flex; align-items: center; border-radius: 999px; background: #edf2f7; color: #344054;
        padding: 4px 8px; font-size: 12px; margin: 2px 4px 2px 0;
      }
      .pill.a { background: #fdecea; color: var(--danger); }
      .pill.b { background: #fef3e2; color: var(--warn); }
      .pill.c { background: #e7f0ff; color: var(--brand); }

      .bar { height: 8px; background: #e4e7ec; border-radius: 999px; overflow: hidden; margin-top: 6px; }
      .fill { height: 100%; background: var(--brand-2); }

      .board { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(220px, 1fr); gap: 12px; overflow-x: auto; padding-bottom: 8px; }
      .kcol { background: #eef1f6; border-radius: 8px; padding: 10px; min-height: 200px; }
      .kcol h3 { font-size: 12px; margin: 0 0 4px; text-transform: uppercase; color: var(--muted); }
      .kcol .kvalue { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
      .kcol.dragover { outline: 2px dashed var(--brand); outline-offset: -2px; }
      .kcard {
        background: #fff; border: 1px solid var(--line); border-radius: 6px; padding: 10px; margin-bottom: 8px;
        cursor: grab; font-size: 12px;
      }
      .kcard b { display: block; font-size: 13px; margin-bottom: 2px; }
      .kcard .kmeta { color: var(--muted); margin-top: 4px; }

      .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
      .filters > div { min-width: 160px; flex: 1; }

      .drawer-overlay {
        display: none; position: fixed; inset: 0; background: rgba(15, 23, 32, 0.45); z-index: 20;
      }
      .drawer-overlay.open { display: block; }
      .drawer {
        position: fixed; top: 0; right: 0; height: 100%; width: min(480px, 100%); background: #fff;
        box-shadow: -8px 0 24px rgba(0,0,0,0.15); transform: translateX(100%); transition: transform 0.2s ease;
        z-index: 21; overflow-y: auto; padding: 20px;
      }
      .drawer.open { transform: translateX(0); }
      .drawer h2 { display: flex; justify-content: space-between; align-items: center; }
      .drawer-section { margin-bottom: 16px; }
      .drawer-section h4 { margin: 0 0 6px; font-size: 12px; text-transform: uppercase; color: var(--muted); }
      .link-btn { background: none; border: none; color: var(--brand); font-weight: 700; cursor: pointer; padding: 0; font-size: 13px; }

      @media (max-width: 860px) {
        .grid, .fields, .metrics { grid-template-columns: 1fr; }
        header { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Vero Volley - Sponsor CRM</h1>
        <div class="sub" id="subtitle">Caricamento dati...</div>
      </div>
      <nav>
        <button class="tab active" data-view="overview" onclick="showView('overview')">Dashboard</button>
        <button class="tab" data-view="pipeline" onclick="showView('pipeline')">Pipeline</button>
        <button class="tab" data-view="leadweekly" onclick="showView('leadweekly')">Lead Weekly</button>
        <button class="tab" data-view="aziende" onclick="showView('aziende')">Aziende &amp; Contatti</button>
        <button class="secondary" onclick="refreshAll()">Aggiorna</button>
      </nav>
    </header>

    <main class="shell">
      <?!= include_('View_Overview'); ?>
      <?!= include_('View_Pipeline'); ?>
      <?!= include_('View_LeadWeekly'); ?>
      <?!= include_('View_Aziende'); ?>
    </main>

    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <aside class="drawer" id="drawer">
      <div id="drawerContent"></div>
    </aside>

    <script>
      let state = null;

      // --- Navigazione tra viste ---
      function showView(name) {
        document.querySelectorAll('.view').forEach(el => el.classList.toggle('active', el.id === 'view-' + name));
        document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.view === name));
        if (name === 'pipeline') loadPipeline();
        if (name === 'leadweekly') loadLeadWeekly();
      }

      // --- Wrapper a promesse per google.script.run ---
      function apiCall(fnName, ...args) {
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(err => reject(err && err.message ? err : new Error(String(err))))
            [fnName](...args);
        });
      }

      function refreshAll() {
        setGlobalStatus('Aggiornamento dashboard...');
        apiCall('getDashboardData')
          .then(data => { state = data; renderOverview(data); setGlobalStatus('Dashboard aggiornata.'); })
          .catch(showGlobalError);
        if (document.getElementById('view-pipeline').classList.contains('active')) loadPipeline();
        if (document.getElementById('view-leadweekly').classList.contains('active')) loadLeadWeekly();
      }

      function setGlobalStatus(message) {
        document.getElementById('subtitle').textContent = message;
      }

      function showGlobalError(error) {
        setGlobalStatus('Errore: ' + (error && error.message ? error.message : String(error)));
      }

      function setStatus(elId, message, kind) {
        const el = document.getElementById(elId);
        if (!el) return;
        el.textContent = message;
        el.className = 'status' + (kind ? ' ' + kind : '');
      }

      function escapeHtml(value) {
        return String(value === undefined || value === null ? '' : value)
          .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
      }

      function priorityClass(priorita) {
        if (priorita === 'A - Alta') return 'a';
        if (priorita === 'B - Media') return 'b';
        return 'c';
      }

      // --- Drawer di dettaglio Azienda/Persona, condiviso da tutte le viste ---
      function openEntityDetail(type, id) {
        document.getElementById('drawerContent').innerHTML = '<p class="sub">Caricamento...</p>';
        openDrawer();
        apiCall('getEntityDetail', type, id).then(detail => renderEntityDetail(type, id, detail)).catch(err => {
          document.getElementById('drawerContent').innerHTML = '<p class="status error">' + escapeHtml(err.message) + '</p>';
        });
      }

      function openDrawer() {
        document.getElementById('drawerOverlay').classList.add('open');
        document.getElementById('drawer').classList.add('open');
      }

      function closeDrawer() {
        document.getElementById('drawerOverlay').classList.remove('open');
        document.getElementById('drawer').classList.remove('open');
      }

      function renderEntityDetail(type, id, detail) {
        const title = type === 'azienda'
          ? ((detail.target[0] || detail.contattate[0] || {})['Azienda'] || id)
          : (((detail.contattate[0] || detail.leadAttivi[0] || {})['Nome'] || '') + ' ' + ((detail.contattate[0] || detail.leadAttivi[0] || {})['Cognome'] || ''));

        let html = '<h2>' + escapeHtml(title) + '<button class="link-btn" onclick="closeDrawer()">Chiudi</button></h2>';
        html += '<p class="sub">' + escapeHtml(id) + '</p>';

        html += entitySection_('Lead attivi', detail.leadAttivi, r => leadSummaryLine_(r));
        html += entitySection_('Trattative', detail.trattative, r => tratSummaryLine_(r));
        if (type === 'azienda') {
          html += entitySection_('Storico azienda', detail.contattate, r => `${escapeHtml(r['Stato'])} - ${escapeHtml(r['Esito'])} (ultimo contatto ${escapeHtml(r['Data Ultimo Contatto'])})`);
          html += entitySection_('Lead archiviati', detail.leadArchiviati, r => leadSummaryLine_(r));
          html += entitySection_('Scartati in passato', detail.scartati, r => `${escapeHtml(r['Nome'])} ${escapeHtml(r['Cognome'])} - ${escapeHtml(r['Motivo Scarto'])}`);
        } else {
          html += entitySection_('Storico contatti', detail.contattate, r => `${escapeHtml(r['Canale'])} - ${escapeHtml(r['Stato'])}/${escapeHtml(r['Esito'])} (${escapeHtml(r['Data Ultimo Contatto'])})`);
        }
        html += entitySection_('Blocchi/esclusioni', detail.blocchi, r => `${escapeHtml(r['Tipo'])}: ${escapeHtml(r['Motivo Blocco'])}`);

        if (type === 'azienda') {
          html += '<div class="drawer-section"><h4>Carica documento</h4>' +
            '<input type="file" id="docFile"><div class="actions"><button class="primary" onclick="uploadDoc(\'' + id + '\')">Carica</button></div>' +
            '<div class="status" id="docStatus"></div></div>';
        }

        document.getElementById('drawerContent').innerHTML = html;
      }

      function entitySection_(label, rows, lineFn) {
        if (!rows || !rows.length) return '<div class="drawer-section"><h4>' + label + '</h4><p class="sub">Nessun dato.</p></div>';
        return '<div class="drawer-section"><h4>' + label + ' (' + rows.length + ')</h4>' +
          rows.map(r => '<div class="sub" style="margin-bottom:4px">' + lineFn(r) + '</div>').join('') + '</div>';
      }

      function leadSummaryLine_(r) {
        return escapeHtml(r['Nome']) + ' ' + escapeHtml(r['Cognome']) + ' - ' + escapeHtml(r['Stato']) + ' (score ' + escapeHtml(r['Sponsor Fit Score']) + ')';
      }

      function tratSummaryLine_(r) {
        return escapeHtml(r['Fase']) + ' - ' + escapeHtml(r['Valore Stimato'] || '0') + ' EUR (' + escapeHtml(r['Probabilita'] || '?') + '%)';
      }

      function uploadDoc(aziendaId) {
        const input = document.getElementById('docFile');
        if (!input.files.length) { setStatus('docStatus', 'Seleziona un file.', 'error'); return; }
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          setStatus('docStatus', 'Caricamento in corso...');
          apiCall('uploadAziendaDocument', { aziendaId: aziendaId, file: { filename: file.name, mimeType: file.type || 'application/octet-stream', base64: base64 } })
            .then(() => setStatus('docStatus', 'Documento caricato.', 'ok'))
            .catch(err => setStatus('docStatus', err.message, 'error'));
        };
        reader.readAsDataURL(file);
      }

      refreshAll();
    </script>
  </body>
</html>
